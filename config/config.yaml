# Глобальный seed:
seed: 42 # для воспроизводимости

data:
  raw_path: "data/microfinance.csv" # путь к сырым данным
  target: "default"                 # целевая переменная (маркер просрочки 30 дней)

split:
  train_size: 0.7  # размер трейн выборки
  stratify: true  # стратификация целевой переменной при разбиении (важно при дисбалансе)      

# Списки фич
features:
  categorical:
    - employment_type
    - region
    - education
    - age_group           # создаётся в CreditPreprocessor (биннинг age)
    - prev_loans_groups   # создаётся в CreditPreprocessor (биннинг prev_loans)
  numeric:
    - age
    - income
    - prev_loans
    - credit_history_bad
    - loan_amount
    - loan_term_days
    - daily_payment       # инженерная: loan_amount / loan_term_days
    - debt_to_income      # инженерная: loan_amount / income
    - payment_to_income   # инженерная: дневной платёж / дневной доход

# Гиперпараметры LogReg
model:
  C: 0.364
  penalty: "l1"          # l1 - зануляет признаки
  solver: "liblinear"    
  class_weight: "balanced"  
  max_iter: 1000


# Параметры подбора порогов
thresholds:
  step: 0.02
  max_review_share: 0.15

# Пути к артефактам.
paths:
  model: "artifacts/credit_pipeline.pkl"
  thresholds: "artifacts/thresholds.json"
  metrics: "artifacts/metrics.json"


# Пороги PSI
monitoring:
  psi_moderate: 0.1
  psi_significate: 0.25


# Прибыль и потеря считаются от суммы займа каждого клиента (loan_amount).
business:
  profit_rate: 0.20         # чистая маржа с возвращённого займа, доля от суммы
  loss_rate: 1.00           # потеря при дефолте, доля от суммы
  manual_review_cost: 200   # фикс. стоимость ручной проверки одной заявки RUB
  review_catch_rate: 0.80   # доля дефолтников, отсекаемых ручной проверкой в серой зоне
  currency: "RUB"
  max_review_share: 0.15    # не больше 15% заявок на ручную проверку

