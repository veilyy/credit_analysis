# Глобальный seed:
seed: 42

data:
  raw_path: "data/microfinance.csv"  
  target: "default"                  

split:
  test_size: 0.3
  stratify: true        

# Списки фич
features:
  categorical:
    - employment_type
    - region
    - education
    - age_group           # создаётся в CreditPreprocessor (биннинг age)
    - prev_loans_groups   # создаётся в CreditPreprocessor (биннинг prev_loans)
  numeric:
    - age
    - income
    - prev_loans
    - credit_history_bad
    - loan_amount
    - loan_term_days
    - daily_payment       # инженерная: loan_amount / loan_term_days
    - debt_to_income      # инженерная: loan_amount / income
    - payment_to_income   # инженерная: дневной платёж / дневной доход

# Гиперпараметры LogReg
model:
  C: 0.364
  penalty: "l1"          
  solver: "liblinear"    
  class_weight: "balanced"  
  max_iter: 1000

# Границы сегментов A/B/C по перцентилям train-скоров.
segmentation:
  low_quantile: 0.33     # < этого -> A (низкий риск)
  high_quantile: 0.66    # >= этого -> C (высокий риск)

# Пути к артефактам.
paths:
  model: "models/credit_pipeline.pkl"
  segment_thresholds: "models/segment_thresholds.json"
  metrics: "models/metrics.json"


# Пороги PSI
monitoring:
  psi_moderate: 0.1
  psi_significate: 0.25


# Бизнес-экономика МФО (для cost-sensitive анализа).
# Прибыль и потеря считаются от суммы займа каждого клиента (loan_amount).
business:
  profit_rate: 0.20         # чистая маржа с возвращённого займа, доля от суммы
  loss_rate: 1.00           # потеря при дефолте, доля от суммы (тело займа, recovery ~0)
  manual_review_cost: 200   # фикс. стоимость ручной проверки одной заявки, ₽
  review_catch_rate: 0.80   # доля дефолтников, отсекаемых ручной проверкой в серой зоне
  currency: "RUB"